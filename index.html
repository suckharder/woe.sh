<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>woe.sh</title>

  <!-- Colors (edit this file to retheme the whole site, or add a holiday to holidays.json) -->
  <link id="colors-stylesheet" rel="stylesheet" href="colors.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          colors: {
            base:    'var(--bg-base)',
            surface: 'var(--bg-surface)',
            elevated:'var(--bg-elevated)',
            accent: {
              DEFAULT: 'var(--accent)',
              bright:  'var(--accent-bright)',
              dim:     'var(--accent-dim)',
            },
            edge: {
              DEFAULT: 'var(--border)',
              subtle:  'var(--border-subtle)',
            },
            ink: {
              DEFAULT: 'var(--text-primary)',
              dim:     'var(--text-secondary)',
              ghost:   'var(--text-muted)',
            },
          },
        },
      },
    }
  </script>

  <!-- marked.js (markdown parser) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>

  <!-- ion-icons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar          { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track    { background: transparent; }
    ::-webkit-scrollbar-thumb    { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Article prose ── */
    /* These styles are applied to content generated by marked.js */
    .prose { line-height: 1.75; font-size: 0.9375rem; color: var(--text-primary); }

    .prose h1, .prose h2, .prose h3, .prose h4 {
      color: var(--text-primary); line-height: 1.3; scroll-margin-top: 4.5rem;
    }
    .prose h1 {
      font-size: 1.875rem; font-weight: 700; margin-top: 0; margin-bottom: 1rem;
      padding-bottom: 0.625rem; border-bottom: 1px solid var(--border);
    }
    .prose h2 {
      font-size: 1.375rem; font-weight: 700; margin-top: 2.25rem; margin-bottom: 0.75rem;
      padding-bottom: 0.375rem; border-bottom: 1px solid var(--border-subtle);
    }
    .prose h3 {
      font-size: 1.0625rem; font-weight: 600; margin-top: 1.625rem; margin-bottom: 0.5rem;
    }
    .prose h4 {
      font-size: 0.9375rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.375rem;
      color: var(--text-secondary);
    }
    .prose p  { margin-bottom: 1.125rem; }
    .prose a  { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; transition: color 0.1s; }
    .prose a:hover { color: var(--accent-bright); }
    .prose strong { font-weight: 600; color: var(--text-primary); }
    .prose em     { font-style: italic; }

    .prose code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.8125rem;
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--accent-bright); padding: 0.15rem 0.4rem; border-radius: 0.5rem;
    }
    .prose pre {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 0.875rem; padding: 1.125rem 1.25rem;
      overflow-x: auto; margin: 1.375rem 0;
    }
    .copy-btn {
      position: absolute; top: 0.625rem; right: 0.625rem;
      background: var(--bg-elevated); border: none; padding: 0.125rem;
      color: var(--text-primary); cursor: pointer; font-size: 1.125rem;
      display: flex; align-items: center; transition: color 0.15s, filter 0.15s;
      border-radius: 0.25rem;
    }
    .copy-btn:hover { color: white; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
    .copy-btn.copied { color: var(--accent); filter: drop-shadow(0 0 6px rgba(229,57,53,0.7)); }
    .prose pre code {
      background: none; border: none; padding: 0;
      color: var(--text-primary); font-size: 0.825rem;
    }
    .prose blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.625rem 0 0.625rem 1rem; margin: 1.375rem 0;
      color: var(--text-secondary);
      background: var(--bg-elevated);
      border-radius: 0 0.75rem 0.75rem 0;
    }
    .prose blockquote p { margin-bottom: 0; }

    .prose .table-wrap {
      overflow-x: auto; overflow-y: hidden; margin: 1.5rem 0;
      border: 1px solid var(--border); border-radius: 0.75rem;
      -webkit-overflow-scrolling: touch;
    }
    .prose table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      font-size: 0.875rem; min-width: 400px;
    }
    .prose th {
      background: var(--bg-elevated); padding: 0.5rem 0.875rem;
      text-align: left; font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary); font-size: 0.8125rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .prose td { padding: 0.5rem 0.875rem; border-bottom: 1px solid var(--border-subtle); }
    .prose tr:last-child td { border-bottom: none; }
    .prose tr:nth-child(even) td { background: var(--bg-surface); }

    .prose ul { list-style: disc;    padding-left: 1.5rem; margin-bottom: 1rem; }
    .prose ol { list-style: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
    .prose li { margin-bottom: 0.375rem; }
    .prose li > ul, .prose li > ol { margin-top: 0.375rem; margin-bottom: 0; }
    .prose hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    /* ── Typewriter cursor ── */
    @keyframes cursor-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    #hero-cursor { animation: cursor-blink 0.7s step-end infinite; }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      #left-sidebar {
        position: fixed !important;
        top: var(--header-height) !important;
        left: 0;
        height: calc(100vh - var(--header-height)) !important;
        z-index: 40;
        transform: translateX(-100%);
        transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      }
      #left-sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block !important; }
      #toc-panel { display: none !important; }
    }
    @media (max-width: 1024px) {
      #toc-panel { display: none !important; }
      #home-screen > div:first-child { padding: 1.5rem 0 2.5rem !important; }
      #home-screen h1 { font-size: 2.25rem !important; line-height: 1.12 !important; }
      main { padding: 1.25rem 1.25rem 4rem !important; }
    }

    body {
      background:
        radial-gradient(ellipse 70% 55% at 0% 0%,
          rgba(229,57,53,0.05) 0%, rgba(229,57,53,0.03) 30%, rgba(229,57,53,0.01) 55%, rgba(229,57,53,0) 70%),
        radial-gradient(ellipse 55% 65% at 100% 100%,
          rgba(229,57,53,0.04) 0%, rgba(229,57,53,0.02) 30%, rgba(229,57,53,0.01) 55%, rgba(229,57,53,0) 70%),
        var(--bg-base);
    }
  </style>
</head>

<body class="font-sans bg-base text-ink flex flex-col min-h-screen">

  <!-- Grain overlay — breaks up gradient banding -->
  <svg class="fixed inset-0 w-full h-full pointer-events-none" style="z-index: 1; opacity: 0.25; mix-blend-mode: soft-light;" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain)"/>
  </svg>

  <!-- Home-only mid blob -->
  <div id="home-blob" style="
    display: none; pointer-events: none;
    position: fixed; z-index: 0;
    width: 1000px; height: 900px;
    top: 30%; left: 60%;
    transform: translate(-20%, -50%);
    background: radial-gradient(ellipse,
      rgba(229,57,53,0.15)  0%,
      rgba(229,57,53,0.13) 10%,
      rgba(229,57,53,0.10) 25%,
      rgba(229,57,53,0.07) 40%,
      rgba(229,57,53,0.04) 55%,
      rgba(229,57,53,0.01) 68%,
      rgba(229,57,53,0)    78%);
    filter: blur(40px);"></div>
  <div id="home-blob-2" style="
    display: none; pointer-events: none;
    position: fixed; z-index: 0;
    width: 550px; height: 500px;
    bottom: -80px; left: 20px;
    background: radial-gradient(ellipse,
      rgba(229,57,53,0.13)  0%,
      rgba(229,57,53,0.10) 10%,
      rgba(229,57,53,0.07) 25%,
      rgba(229,57,53,0.04) 45%,
      rgba(229,57,53,0.01) 62%,
      rgba(229,57,53,0)    75%);
    filter: blur(32px);"></div>

  <!-- ── Header ── -->
  <div id="site-header" style="position: relative; z-index: 50;"></div>

  <!-- ── Main layout ── -->
  <!-- align-items: flex-start is required for position:sticky on flex children -->
  <div class="flex flex-1" style="align-items: flex-start;">

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40" style="display:none; top: var(--header-height);"
      onclick="toggleSidebar(false)"></div>

    <!-- Left sidebar -->
    <aside id="left-sidebar" class="flex-shrink-0 flex flex-col bg-surface border-r border-edge"
      style="
        width: var(--sidebar-width);
        position: sticky;
        top: var(--header-height);
        height: calc(100vh - var(--header-height));
        overflow: hidden;">

      <!-- Search + collapse control -->
      <div class="border-b border-edge-subtle" style="flex-shrink: 0;">
        <div class="px-4 pt-3 pb-2 relative">
          <ion-icon name="search-outline"
            class="absolute text-ink-ghost pointer-events-none"
            style="left: 1.75rem; top: 50%; transform: translateY(-50%); font-size: 0.875rem;"></ion-icon>
          <input id="search-input" type="text" placeholder="Search articles…"
            class="w-full font-sans text-ink bg-elevated border border-edge rounded-xl outline-none"
            style="padding: 0.45rem 0.75rem 0.45rem 2.125rem; font-size: 0.8125rem; transition: border-color 0.15s;"
            onfocus="this.style.borderColor='var(--accent)'"
            onblur="this.style.borderColor='var(--border)'">
        </div>
        <div style="padding: 0 0.75rem 0.5rem; display: flex; justify-content: flex-end;">
          <button id="collapse-btn" style="
            font-family: inherit; font-size: 0.7rem; font-weight: 500;
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); letter-spacing: 0.04em;
            padding: 0.125rem 0; transition: color 0.1s;"
            onmouseover="this.style.color='var(--text-secondary)'"
            onmouseout="this.style.color='var(--text-muted)'">
            Expand all
          </button>
        </div>
      </div>

      <!-- Nav -->
      <nav id="nav-categories"
        class="flex-1 overflow-y-auto"
        style="padding: 0.75rem 0.5rem 2rem;">
        <div class="text-ink-ghost" style="padding: 0.875rem; font-size: 0.8125rem;">Loading…</div>
      </nav>
    </aside>

    <!-- Center + TOC wrapper -->
    <div class="flex flex-1 min-w-0" style="align-items: flex-start;">

      <!-- Main content -->
      <main class="flex-1 min-w-0" style="padding: 3rem 3rem 6rem; max-width: 56rem; margin: 0 auto;">

        <!-- Home screen -->
        <div id="home-screen">
          <div style="padding: 4rem 0 5rem;">
            <p style="font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--accent); margin-bottom: 1.25rem;">Seldom updated, highly opinionated</p>
            <h1 style="font-size: 3.75rem; font-weight: 700; letter-spacing: -0.04em; line-height: 1.07; margin-bottom: 1.5rem; color: var(--text-primary);">
              <span id="hero-typed"></span><span id="hero-cursor" style="color: var(--accent);">|</span><span style="color: var(--accent)">.</span>
            </h1>
            <p style="font-size: 1.0625rem; line-height: 1.75; color: var(--text-secondary); max-width: 34rem;">
              Awesome lists, guides, documentation, resources, opinions and more.
            </p>
          </div>
          <div id="home-categories"></div>
        </div>

        <!-- Article view -->
        <div id="article-view" style="display: none;">
          <div id="article-meta"></div>
          <div id="article-body" class="prose"></div>
        </div>

        <!-- Error screen -->
        <div id="error-screen" style="display: none; text-align: center; padding: 5rem 2rem;">
          <ion-icon name="alert-circle-outline"
            style="font-size: 2.5rem; color: var(--accent); display: block; margin: 0 auto 1rem;"></ion-icon>
          <h2 id="err-title"
            style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-primary);"></h2>
          <p id="err-msg"
            style="font-size: 0.875rem; color: var(--text-secondary);"></p>
          <a href="#/" style="
            display: inline-block; margin-top: 1.5rem; font-size: 0.8125rem;
            color: var(--accent); text-decoration: none; border: 1px solid var(--accent);
            padding: 0.4rem 1rem; border-radius: 0.75rem;"
            onmouseover="this.style.background='var(--accent-dim)'"
            onmouseout="this.style.background='transparent'">
            ← Back home
          </a>
        </div>

      </main>

      <!-- Right TOC -->
      <aside id="toc-panel"
        class="flex-shrink-0 overflow-y-auto text-ink-dim"
        style="
          display: none;
          width: var(--toc-width);
          position: sticky;
          top: var(--header-height);
          height: calc(100vh - var(--header-height));
          padding: 2rem 1.25rem 2rem 0.5rem;">

        <p class="text-ink-ghost"
          style="font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; padding-left: 0.625rem;">
          On this page
        </p>
        <ul id="toc-list" style="list-style: none; padding: 0; margin: 0;"></ul>
      </aside>

    </div>
  </div>

  <!-- ── Footer ── -->
  <div id="site-footer"></div>

  <script src="app.js"></script>
</body>
</html>
